openapi: 3.0.1
info:
  title: API Projects
  version: 1.0.0

servers:
  - url: http://localhost:809

paths:
  /projects:
    get:
      summary: "Elenco progetti"
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectDTO'
    post:
      summary: "Crea progetto"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectDTO'
      responses:
        '201':
          description: "Creato"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDTO'

  /projects/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
    put:
      summary: "Aggiorna progetto"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectDTO'
      responses:
        '200':
          description: "Aggiornato"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDTO'
    delete:
      summary: "Cancella progetto"
      responses:
        '204':
          description: "Cancellato"

components:
  schemas:
    ProjectDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        codice:
          type: string
        nome:
          type: string
        descrizione:
          type: string
        dataInizio:
          type: string
          format: date
        durata:
          type: integer
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskDTO'

    TaskDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        codice:
          type: string
        nome:
          type: string
        descrizione:
          type: string
        dataInizio:
          type: string
          format: date
        durata:
          type: integer
        slots:
          type: array
          items:
            $ref: '#/components/schemas/SlotDTO'
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserDTO'

    SlotDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        dataInizio:
          type: string
          format: date
        dataFine:
          type: string
          format: date
        durata:
          type: integer

    UserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nome:
          type: string
        cognome:
          type: string
        mail:
          type: string
        profilo:
          type: string
        orarioGiornaliero:
          type: number
          format: double
